<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max Acres — Campaign Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F6F2;--surface:#FFF;--surface2:#EDF2EB;--surface3:#D8E0D4;--border:#C2CCBA;--text:#022e19;--text2:#3D5C47;--text3:#7A9882;--accent:#006838;--realtor:#2563EB;--realtor-bg:#EFF4FF;--buyer:#059669;--buyer-bg:#ECFDF5;--neighbor:#D97706;--neighbor-bg:#FFFBEB;--investor:#7C3AED;--investor-bg:#F5F3FF;--pricedrop:#DC2626;--pricedrop-bg:#FEF2F2;--critical:#DC2626;--success:#006838;--call-badge:#DB2777;--radius:8px;--radius-sm:5px;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:grid;grid-template-columns:360px 1fr;grid-template-rows:auto 1fr;height:100vh}
.header{grid-column:1/-1;background:#00582f;border-bottom:1px solid #022e19;padding:14px 24px;display:flex;align-items:center;gap:20px;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;color:#fff}.header h1 span{color:#e0b52c}
.legend{display:flex;gap:12px;align-items:center}.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.75)}.legend-dot{width:10px;height:10px;border-radius:3px}
.header-stats{display:flex;gap:12px;margin-left:auto;flex-wrap:wrap}
.stat-pill{background:rgba(255,255,255,.12);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.8)}
.stat-pill .num{font-family:'Space Mono',monospace;font-weight:700;color:#e0b52c}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-filters{padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.filter-group{margin-bottom:10px}
.filter-group:last-child{margin-bottom:0}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:5px;display:block}
.filter-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text);background:var(--surface);outline:none;cursor:pointer}
.filter-select:focus{border-color:#006838}
.checkbox-group{display:flex;flex-direction:column;gap:4px}
.cb-label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0;transition:color .15s}
.cb-label:hover{color:var(--text)}
.cb-label input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
.search-box{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;font-size:13px;pointer-events:none;z-index:1}
.search-input{width:100%;padding:9px 30px 9px 32px;border:1px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent);background:var(--surface)}
.search-input::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:6px;background:none;border:none;font-size:16px;color:var(--text3);cursor:pointer;padding:2px 4px;line-height:1;display:none}
.search-clear:hover{color:var(--text)}
.search-clear.show{display:block}
.sidebar-content{flex:1;padding:8px;overflow-y:auto}.sidebar-content.hidden{display:none}
.prop-card{padding:10px;border-radius:var(--radius);font-size:11px;position:relative;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);transition:box-shadow .15s;cursor:pointer}
.prop-card:hover{box-shadow:var(--shadow);border-color:#006838}
.prop-card-top{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:4px}
.prop-card-address{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.prop-card-badges{display:flex;gap:3px;align-items:center;flex-shrink:0}
.prop-card-meta{display:flex;gap:6px;font-size:10px;color:var(--text2);flex-wrap:wrap;margin-bottom:6px}
.prop-card-meta span{display:flex;align-items:center;gap:2px}
.prop-card-campaigns{display:flex;gap:4px;flex-wrap:wrap}
.hl-value{font-family:'Space Mono',monospace;font-weight:700;font-size:12px;padding:2px 10px;border-radius:6px;display:inline-block;margin-bottom:5px}
.hl-profit{background:#ECFDF5;color:#059669;border:1px solid #A7F3D0}
.hl-expire{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.hl-lastcamp{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.campaign-chip{font-size:10px;font-weight:600;padding:4px 10px;border-radius:12px;cursor:grab;transition:.15s;border:1px solid;display:inline-flex;align-items:center;gap:3px;user-select:none}
.campaign-chip:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.12)}
.campaign-chip:active{cursor:grabbing;opacity:.7}
.campaign-chip.dragging{opacity:.25}
.campaign-chip.realtor{background:var(--realtor-bg);color:var(--realtor);border-color:#BFDBFE}
.campaign-chip.buyer{background:var(--buyer-bg);color:var(--buyer);border-color:#A7F3D0}
.campaign-chip.neighbor{background:var(--neighbor-bg);color:var(--neighbor);border-color:#FDE68A}
.campaign-chip.investor{background:var(--investor-bg);color:var(--investor);border-color:#DDD6FE}
.campaign-chip.pricedrop{background:var(--pricedrop-bg);color:var(--pricedrop);border-color:#FECACA}
.chip-call{font-size:7px;background:var(--call-badge);color:#fff;padding:1px 4px;border-radius:4px}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;font-family:'Space Mono',monospace}
.badge-jose{background:#DBEAFE;color:#1E40AF}.badge-gab{background:#e0b52c;color:#022e19}
.pod-filter{cursor:pointer;padding:3px 10px;font-size:10px;transition:.15s;border:2px solid transparent}
.pod-filter:hover{transform:scale(1.1)}
.pod-filter.active{border-color:#fff;box-shadow:0 0 0 2px rgba(224,181,44,.4)}
.badge-tah{background:#e0b52c;color:#022e19;font-size:8px}
.badge-exp{font-size:8px;padding:1px 5px;border-radius:8px;background:#F3F4F6;color:#6B7280;border:1px solid #E5E7EB}
.badge-exp.urgent{background:#FEE2E2;color:#DC2626;border-color:#FECACA}

/* AI Recommendation Cards */
.ai-card{padding:10px 12px;border-radius:var(--radius);margin-bottom:6px;background:var(--surface);border:1px solid var(--border);transition:box-shadow .15s;position:relative}
.ai-card:hover{box-shadow:var(--shadow)}
.ai-card-rank{position:absolute;top:8px;left:10px;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--surface3);line-height:1}
.ai-card-top{display:flex;align-items:center;gap:6px;margin-left:30px;margin-bottom:4px}
.ai-card-address{font-weight:700;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;cursor:pointer}
.ai-card-address:hover{color:var(--accent);text-decoration:underline}
.ai-card-score{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--accent);background:rgba(0,104,56,.08);padding:2px 8px;border-radius:10px}
.ai-card-reason{font-size:10px;color:var(--text2);margin-left:30px;margin-bottom:6px;line-height:1.4}
.ai-card-chip-row{margin-left:30px;display:flex;gap:4px;align-items:center}
.ai-card-meta{display:flex;gap:6px;font-size:9px;color:var(--text3);margin-left:30px;margin-top:4px}
.calendar-wrap{overflow:auto;padding:16px}
.calendar-controls{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:var(--radius-sm);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{background:var(--surface3)}
.cal-month{font-size:16px;font-weight:600;min-width:180px;text-align:center}
.calendar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header-cell{background:var(--surface);padding:10px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.cal-day{background:var(--surface);min-height:140px;padding:8px;display:flex;flex-direction:column;transition:background .15s;position:relative}
.cal-day.today{background:rgba(0,104,56,.06)}.cal-day.past{background:#F9FAFB}
.cal-day.past>.cal-day-header{opacity:.4}
.cal-day.past .cal-day-cards .sched-card{pointer-events:none;opacity:.3;cursor:default}

/* Reschedule Section */
.resched-section{display:none}
.resched-section.has-items{display:block;background:#FEF2F2;border-bottom:2px solid #FECACA;padding:10px 12px}
.resched-title{font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.resched-title .resched-count{background:#DC2626;color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-family:'Space Mono',monospace}
.resched-card{padding:8px 10px;border-radius:var(--radius);margin-bottom:5px;background:#fff;border:1px solid #FECACA;border-left:3px solid #DC2626;cursor:grab;user-select:none;transition:box-shadow .15s}
.resched-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.resched-card:active{cursor:grabbing;opacity:.7}
.resched-card-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.resched-card-type{font-weight:700;font-size:11px;color:#DC2626}
.resched-card-addr{font-size:11px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resched-card-date{font-size:10px;color:#DC2626;font-weight:600;background:#FEE2E2;padding:2px 8px;border-radius:6px}
.cal-day.drop-target{background:rgba(0,104,56,.06);outline:2px dashed var(--accent);outline-offset:-2px}
.cal-day.outside{background:#F9FAFB;opacity:.3;pointer-events:none}
.cal-day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cal-day-num{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--text2)}
.cal-day.today .cal-day-num{color:var(--accent)}
.cal-day-stats{display:flex;align-items:center;gap:5px}
.cal-day-profit{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#006838}
.cal-day-pod{font-family:'Space Mono',monospace;font-size:9px;font-weight:600;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:6px}
.cal-day-count{font-size:10px;font-weight:700;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:8px}
.cal-day-count.ok{background:rgba(16,185,129,.15);color:var(--success)}.cal-day-count.low{background:rgba(239,68,68,.15);color:var(--critical)}.cal-day-count.zero{background:var(--surface2);color:var(--text3)}
.cal-day-cards{flex:1;display:flex;flex-direction:column;gap:3px;overflow-y:auto;min-height:40px}
.sched-card{padding:5px 8px;border-radius:var(--radius-sm);font-size:10px;cursor:grab;border-left:3px solid;position:relative;user-select:none;display:flex;align-items:center;gap:5px}
.sched-card:hover{box-shadow:var(--shadow)}
.sched-card.realtor{background:var(--realtor-bg);border-left-color:var(--realtor)}.sched-card.buyer{background:var(--buyer-bg);border-left-color:var(--buyer)}
.sched-card.neighbor{background:var(--neighbor-bg);border-left-color:var(--neighbor)}.sched-card.investor{background:var(--investor-bg);border-left-color:var(--investor)}
.sched-card.pricedrop{background:var(--pricedrop-bg);border-left-color:var(--pricedrop)}
.sched-type{font-weight:700;font-size:10px}.sched-addr{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;max-width:90px}
.sched-pod{font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px}
.sched-pod.jose{background:#DBEAFE;color:#1E40AF}.sched-pod.gab{background:#FDE68A;color:#92400E}
.remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;display:none;padding:0 2px;line-height:1;margin-left:auto}
.sched-card:hover .remove-btn{display:block;color:var(--critical)}
.empty-day{font-size:10px;color:var(--text3);text-align:center;padding:20px 4px;font-style:italic}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:0;max-width:780px;width:94%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border)}.modal-header-top{display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:15px;font-weight:700;margin-bottom:2px}.modal-subtitle{font-size:12px;color:var(--text2)}
.modal-close-x{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}.modal-close-x:hover{color:var(--text)}
.modal-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.modal-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.modal-tag.t-realtor{background:#DBEAFE;color:#1D4ED8}.modal-tag.t-buyer{background:#D1FAE5;color:#047857}
.modal-tag.t-neighbor{background:#FEF3C7;color:#B45309}.modal-tag.t-investor{background:#EDE9FE;color:#6D28D9}
.modal-tag.t-call{background:#FCE7F3;color:#BE185D}.modal-tag.t-text{background:var(--surface2);color:var(--text2)}
.modal-tag.t-round{background:var(--surface2);color:var(--text2)}.modal-tag.t-owned{background:#e0b52c;color:#022e19}
.modal-tag.t-exp{background:#F3F4F6;color:#6B7280}.modal-tag.t-exp-urgent{background:#FEE2E2;color:#DC2626}
.modal-body{padding:16px 24px 20px}.modal-section{margin-bottom:18px}
.modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--surface2)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px}
.modal-field{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}.modal-field .fl{color:var(--text2)}.modal-field .fv{font-weight:600;text-align:right}
.modal-field .fv.positive{color:#059669}.modal-field .fv.negative{color:#DC2626}.modal-field .fv.highlight{color:var(--accent)}
.modal-reasoning{background:#F0F4FF;border:1px solid #DBEAFE;border-radius:8px;padding:14px 16px;font-size:12px;line-height:1.6;color:#1E3A5F}
.modal-reasoning strong{font-weight:700}.modal-reasoning .reason-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:6px;display:block}
.modal-history-table{width:100%;font-size:11px;border-collapse:collapse}
.modal-history-table th{text-align:left;padding:6px 8px;background:var(--surface2);color:var(--text2);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.modal-history-table td{padding:5px 8px;border-bottom:1px solid var(--surface2)}.modal-history-table tr:last-child td{border-bottom:none}
.modal-history-empty{font-size:12px;color:var(--text3);font-style:italic;padding:12px 0}
.history-scroll{max-height:280px;overflow-y:auto;border:1px solid var(--surface2);border-radius:6px}
.modal-footer{padding:12px 24px 20px;display:flex;justify-content:flex-end}
.modal-close-btn{background:#006838;color:#fff;border:none;padding:8px 28px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px}.modal-close-btn:hover{opacity:.9}
.modal-notes{width:100%;min-height:70px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:var(--surface2);resize:vertical;line-height:1.5;outline:none}
.modal-notes:focus{border-color:var(--accent)}.modal-notes::placeholder{color:var(--text3)}
.sched-row{padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.sched-row-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sched-row-date{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);background:rgba(0,104,56,.08);padding:3px 10px;border-radius:6px}
.sched-row-type{font-size:11px;font-weight:700}
.sched-row-field{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sched-row-label{font-size:11px;font-weight:600;color:var(--text2);min-width:90px}
.sched-row select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text);background:var(--surface);outline:none}
.sched-row select:focus{border-color:var(--accent)}
.sched-row textarea{width:100%;min-height:50px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text);background:var(--surface);resize:vertical;outline:none;line-height:1.4}
.sched-row textarea:focus{border-color:var(--accent)}
.sched-row textarea::placeholder{color:var(--text3)}
.no-sched{font-size:12px;color:var(--text3);font-style:italic;padding:12px 0}
.counties-input{width:100%;min-height:50px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text);background:var(--surface);resize:vertical;outline:none;line-height:1.4}
.counties-input:focus{border-color:var(--accent)}
.counties-input::placeholder{color:var(--text3)}
.counties-input.has-error{border-color:#DC2626;background:#FEF2F2}
.counties-error{font-size:10px;color:#DC2626;margin-top:4px;line-height:1.4;display:none}
.counties-error.show{display:block}
.county-warning{font-size:10px;color:#B45309;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:6px 10px;margin-top:4px;line-height:1.5}
.county-warning strong{color:#92400E}
.county-warning .mkt-note{font-size:9px;color:#DC2626;font-weight:700;font-style:italic;display:block;margin-top:3px}
.seq-note{font-size:10px;background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;padding:5px 10px;border-radius:6px;margin-top:4px;margin-bottom:6px;line-height:1.4;font-style:italic}
.not-created-flag{font-size:10px;font-weight:700;color:#DC2626;background:#FEE2E2;border:1px solid #FECACA;padding:3px 10px;border-radius:6px;display:inline-block;margin-left:8px}
.sched-card.not-created-cal{border:2px solid #DC2626!important;background:#FEF2F2!important;border-left:3px solid #DC2626!important}
.not-created-cal-flag{font-size:7px;font-weight:700;color:#DC2626;background:#FEE2E2;padding:1px 4px;border-radius:3px;position:absolute;bottom:1px;right:2px;white-space:nowrap}
.sched-locked{opacity:.7;background:var(--surface3)!important}
.sched-locked select,.sched-locked textarea{opacity:.6;cursor:not-allowed;background:var(--surface3)!important}
.locked-badge{font-size:9px;font-weight:700;color:var(--text3);background:var(--surface3);border:1px solid var(--border);padding:2px 8px;border-radius:6px;margin-left:auto}
.sched-row.collapsed{padding:0}
.sched-row.collapsed .sched-row-header{cursor:pointer;padding:10px 12px}
.sched-row.collapsed .sched-row-header:hover{background:var(--surface2)}
.sched-row-collapsed-header{display:flex;align-items:center;gap:8px}
.expand-arrow{font-size:10px;color:var(--text3);transition:transform .2s}
.sched-row.collapsed .expand-arrow{transform:rotate(0deg)}
.sched-row-body{display:block}
.sched-row.collapsed .sched-row-body{display:none}
.upload-mini{display:flex;align-items:center;gap:8px}
.upload-mini label{font-size:11px;padding:5px 12px;border-radius:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);cursor:pointer;font-weight:600;color:rgba(255,255,255,.85)}
.upload-mini label:hover{border-color:#e0b52c;color:#fff}
.upload-mini input{display:none}
.save-indicator{font-size:10px;color:#e0b52c;font-weight:600;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}
.mcr-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;transition:.15s;white-space:nowrap}

.mcr-overlay.show{display:flex}
.mcr-modal{background:var(--surface);border-radius:14px;width:95%;max-width:1100px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.mcr-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.mcr-title{font-size:17px;font-weight:700;color:var(--text)}
.mcr-title span{color:var(--accent)}
.mcr-filters{display:flex;gap:6px}
.mcr-filter{padding:5px 14px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;transition:.15s}
.mcr-filter:hover{border-color:var(--accent);color:var(--text)}

.mcr-close:hover{color:var(--text)}
.mcr-body{overflow:auto;flex:1;padding:0}

.mcr-table thead{position:sticky;top:0;z-index:2}
.mcr-table th{background:#00582f;color:#fff;padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.mcr-table th:first-child{border-radius:0}
.mcr-table td{padding:8px 12px;border-bottom:1px solid var(--surface2);vertical-align:top}
.mcr-table tr:hover{background:rgba(0,104,56,.03)}
.mcr-table tr:last-child td{border-bottom:none}
.mcr-prop-addr{font-weight:700;font-size:11px;color:var(--text);white-space:nowrap}
.mcr-prop-sub{font-size:9px;color:var(--text3)}

</div>

function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function fmt$(n){return n<0?'-$'+Math.abs(n).toLocaleString():'$'+n.toLocaleString()}
function shortAddr(a){if(!a)return'—';const p=a.split(',');let s=p[0].trim();const city=p.length>1?p[1].trim():'';const st=p.length>2?p[2].trim():'';if(!s&&city)s=city;if(s.length>24)s=s.substring(0,22)+'…';return city&&s!==city?s+', '+city:st?s+', '+st:s}
function daysSince(ds){if(!ds)return 999;const[y,m,d]=ds.split('-').map(Number);return Math.round((TODAY-new Date(y,m-1,d))/86400000)}

function renderCard(prop,hl){
  const pod=prop.pod==='Jose'?'badge-jose':'badge-gab',podL=prop.pod==='Gabriel'?'Gab':prop.pod;
  const exp=prop.expDays===0?'<span class="badge badge-tah">TAH Owned</span>':prop.expDays<0?'<span class="badge badge-exp urgent">Expired</span>':`<span class="badge badge-exp${prop.expDays<=15?' urgent':''}">Exp: ${prop.expDays}d</span>`;
  const last=prop.lastCampaign?daysSince(prop.lastCampaign)+'d ago':'Never';
  let hlBox='';
  if(hl==='profit')hlBox=`<span class="hl-value hl-profit">${fmt$(prop.profit)}</span>`;
  if(hl==='expire')hlBox=`<span class="hl-value hl-expire">${prop.expDays<0?'EXPIRED':prop.expDays+'d to expiration'}</span>`;
  if(hl==='lastcamp')hlBox=`<span class="hl-value hl-lastcamp">Last campaign: ${last}</span>`;
  const chips=STANDARD_CAMPAIGNS.filter(obj=>{
    return true;
  }).map(obj=>{
    const cls=CLS[obj]||'realtor',s=SHORT[obj]||obj;
    return`<span class="campaign-chip ${cls}" draggable="true" data-pid="${prop.id}" data-obj="${obj}" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()" ondragstart="chipDS(event)" ondragend="chipDE(event)">${s}</span>`;
  }).join('');
  return`<div class="prop-card" onclick="showModal('${prop.id}')"><div class="prop-card-top"><span class="prop-card-address">${shortAddr(prop.address)}</span><div class="prop-card-badges"><span class="badge ${pod}">${podL}</span>${exp}</div></div>
    ${hlBox?'<div style="margin-bottom:5px">'+hlBox+'</div>':''}
    <div class="prop-card-meta"><span>${prop.state}</span>${hl!=='profit'?'<span>'+fmt$(prop.profit)+'</span>':''}${hl!=='expire'?'<span>'+(prop.expDays===0?'TAH Owned':prop.expDays<0?'Expired':'Exp:'+prop.expDays+'d')+'</span>':''}${hl!=='lastcamp'?'<span>Last:'+last+'</span>':''}<span>${prop.acreage}ac</span></div>
    <div class="prop-card-campaigns">${chips}</div></div>`;
}

function scoreAIRecommendations(){
  const recs=[];
  const typeMod={'Realtors Reach Out':0,'Buyer Base Reach Out':-5,'Neighbor Reach Out':-10,'InvestorBase Reach Out':-25,'Price Reduction':-15};
  
  PROPS.forEach(prop=>{
    // Skip TAH Owned and expired properties
    if(prop.isOwned)return;
    if(prop.expDays<0)return;
    // Base score for property
    let base=0;
    const reasons=[];
    
    // Fresh launch bonus
    if(!prop.history||prop.history.length===0){base+=200;reasons.push('Never campaigned — fresh launch priority');}
    
    // Expiration urgency
    if(prop.expDays>0){
      if(prop.expDays<=14){base+=150;reasons.push(`Only ${prop.expDays}d to expiration`);}
      else if(prop.expDays<=30){base+=100;reasons.push(`${prop.expDays}d to expiration — approaching`);}
      else if(prop.expDays<=60){base+=50;}
      else{base+=20;}
    }
    
    // Profit bonus
    if(prop.profit>=30000){base+=80;reasons.push(`High-value: ${fmt$(prop.profit)}`);}
    else if(prop.profit>=15000){base+=50;reasons.push(`Solid profit: ${fmt$(prop.profit)}`);}
    else if(prop.profit>=5000){base+=20;}
    else if(prop.profit>0){base+=5;}
    
    // DOM factor
    if(prop.dom>=100){base+=30;reasons.push(`${prop.dom} DOM — sitting too long`);}
    else if(prop.dom>=60){base+=15;}
    
    // Days since last campaign
    const dsl=daysSince(prop.lastCampaign);
    if(dsl>=30){base+=40;reasons.push('30+ days since last campaign');}
    else if(dsl>=14){base+=20;reasons.push(`${dsl}d since last campaign`);}
    
    // Coverage gap bonus — check which outreach types have been run
    const doneTypes=new Set();
    if(prop.history)prop.history.forEach(h=>{if(h.objective)doneTypes.add(h.objective);});
    const coreTypes=['Realtors Reach Out','Buyer Base Reach Out','Neighbor Reach Out','InvestorBase Reach Out'];
    const missing=coreTypes.filter(t=>!doneTypes.has(t));
    if(missing.length>=3){base+=40;reasons.push(`${missing.length} core types never run`);}
    else if(missing.length>0){base+=missing.length*15;}
    
    // Generate a recommendation for each campaign type
    STANDARD_CAMPAIGNS.forEach(obj=>{
      // Skip neighbor campaigns for non-eligible properties
      // Neighbor available for all properties
      let score=base+(typeMod[obj]||0);
      let reason=reasons.slice(0,2).join(' · ');
      
      // Extra boost if this specific type hasn't been done
      if(!doneTypes.has(obj)&&obj!=='Price Reduction'){
        score+=25;
        reason+=(reason?' · ':'')+SHORT[obj]+' never run';
      }
      
      // Price Reduction only makes sense if there have been price drops
      if(obj==='Price Reduction'){
        if(prop.priceDrops&&parseInt(prop.priceDrops)>0){
          score+=20;
          reason+=(reason?' · ':'')+'Has price drops — announce to market';
        }else{
          score-=50; // Deprioritize if no price drops
        }
      }
      
      score=Math.max(score,1);
      recs.push({pid:prop.id,obj,score,reason,prop});
    });
  });
  
  // Sort by score descending
  recs.sort((a,b)=>b.score-a.score);
  return recs;
}

  return`<div class="ai-card">

function applyNotDoneFilter(propList){
  if(state.notDoneFilters.length===0)return propList;
  const filterMap={
    'realtor':'Realtors Reach Out',
    'buyer':'Buyer Base Reach Out',
    'investor':'InvestorBase Reach Out',
    'pricedrop':'Price Reduction',
    'neighbor':'Neighbor Reach Out'
  };
  return propList.filter(prop=>{
    const doneTypes=new Set();
    if(prop.history)prop.history.forEach(h=>{if(h.objective)doneTypes.add(h.objective);});
    for(const f of state.notDoneFilters){
      const objName=filterMap[f];
      // All properties eligible for neighbor campaigns
      if(!doneTypes.has(objName))return true;
    }
    return false;
  });
}

function renderSidebar(){
  const tab=state.activeTab;
  const el=document.getElementById('sb-content');
  const FP=getFilteredProps();
  const FPA=tab==='owned'?FP:FP.filter(p=>!p.isOwned);
  if(tab==='ai'){
    const recs=scoreAIRecommendations();
    const filtered=state.podFilter?recs.filter(r=>(r.prop.pod||'').trim()===state.podFilter):recs;
    // Apply notDone filter to AI recs
    let top=filtered;
    if(state.notDoneFilters.length>0){
      const validPids=new Set(applyNotDoneFilter(FPA).map(p=>p.id));
      top=top.filter(r=>validPids.has(r.pid));
    }
    if(state.searchQuery){
      const searchPids=new Set(applySearch(FPA).map(p=>p.id));
      top=top.filter(r=>searchPids.has(r.pid));
    }
    top=top.slice(0,30);
    el.innerHTML='<div style="padding:8px 8px 4px;font-size:10px;color:var(--text3);font-style:italic">AI-ranked campaigns by priority score. Drag any chip to the calendar.</div>'+top.map((r,i)=>renderAICard(r,i+1)).join('');
    return;
  }
  if(tab==='new'){
    const now=new Date();
    const activeNew=state.newPropertyIds.filter(n=>{
      const [ny,nm,nd]=n.detected.split('-').map(Number);const det=new Date(ny,nm-1,nd);
      const daysDiff=Math.round((now-det)/(86400000));
      return daysDiff<=10;
    });
    state.newPropertyIds=activeNew;
    const newIds=new Set(activeNew.map(n=>n.id));
    let newProps=FPA.filter(p=>newIds.has(p.id));
    newProps=applyNotDoneFilter(newProps);
    newProps=applySearch(newProps);
    if(newProps.length===0){el.innerHTML='<div class="empty-day" style="padding:40px">No new properties detected.<br><br><span style="font-size:10px;color:var(--text3)">New properties appear here when a CSV refresh contains listings that weren\'t in the previous upload. They stay for 10 days.</span></div>';return;}
    el.innerHTML='<div style="padding:8px 8px 4px;font-size:10px;color:#059669;font-weight:600">\u{1F195} '+newProps.length+' new propert'+(newProps.length===1?'y':'ies')+' added recently</div>'+newProps.map(p=>{
      const entry=activeNew.find(n=>n.id===p.id);
      const det=entry?(()=>{const[ey,em,ed]=entry.detected.split('-').map(Number);return new Date(ey,em-1,ed)})():now;
      const daysAgo=Math.round((now-det)/86400000);
      const daysLeft=10-daysAgo;
      return'<div style="font-size:9px;color:var(--text3);padding:2px 10px;margin-bottom:-2px">Added '+daysAgo+'d ago \u2014 '+daysLeft+'d left in New</div>'+renderCard(p,null);
    }).join('');
    return;
  }
  let list,hl=null;
  if(tab==='all'){list=[...FPA];}
  else if(tab==='profit'){list=[...FPA].sort((a,b)=>b.profit-a.profit);hl='profit';}
  else if(tab==='dom'){list=[...FPA].filter(p=>p.expDays!==0).sort((a,b)=>a.expDays-b.expDays);hl='expire';}
  else if(tab==='lastcamp'){list=[...FPA].sort((a,b)=>daysSince(b.lastCampaign)-daysSince(a.lastCampaign));hl='lastcamp';}
  else if(tab==='owned'){list=FPA.filter(p=>p.isOwned);}
  else{list=[...FPA];}
  list=applyNotDoneFilter(list);
  list=applySearch(list);
  el.innerHTML=list.length?list.map(p=>renderCard(p,hl)).join(''):'<div class="empty-day" style="padding:40px">No properties match current filters</div>';
}

      const cls=CLS[it.obj]||'realtor',s=SHORT[it.obj]||'';

    if(isP)dayClass+=' past';

    const emptyMsg=!isP&&!isO&&cnt===0?'<div class="empty-day">Drop campaigns here</div>':'';
    h+=`<div class="${dayClass}" data-date="${ds}">

function processCSVData(pipelineRows,historyRows){
  const today=new Date();
  const histByLid={};
  historyRows.forEach(c=>{
    const lid=(c['The Market Hub #']||'').trim();
    const obj=(c['Campaign Objective']||'').trim();
    const ch=(c['Outreach Channel']||'').trim();
    const status=(c['Campaign Status']||'').trim();
    const rd=(c['Campaign Run Date']||'').trim();
    const members=(c['Actual Campaign Members']||'').trim();
    const rc=(c['Realtor Counties (if Multiple Counties)']||'').trim();
    const bc=(c['Buyer Base Counties (Multiple Counties)']||'').trim();
    const ic=(c['Investor Base Target Cities']||'').trim();
    const counties=rc||bc||ic;
    if(!lid||!obj)return;
    if(!histByLid[lid])histByLid[lid]=[];
    if(status==='Completed')histByLid[lid].push({objective:obj,channel:ch,runDate:rd,members,counties});
  });
  const csvSchedule={};
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-15);
  const todayDs=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  const seenSched={};// dedup: "ds|pid|obj" -> true
  const propIds=new Set(pipelineRows.map(p=>(p['Main Listing']||'').trim()).filter(Boolean));
  historyRows.forEach(c=>{
    const lid=(c['The Market Hub #']||'').trim();
    const obj=(c['Campaign Objective']||'').trim();
    const status=(c['Campaign Status']||'').trim();
    const rd=(c['Campaign Run Date']||'').trim();
    if(!lid||!obj||!rd)return;
    if(status==='Not Needed'||status==='')return;
    if(!propIds.has(lid))return;// skip campaigns for properties not in pipeline
    let d;try{const p=rd.split('/');d=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));}catch(e){return;}
    if(d<cutoff)return;
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dedupKey=ds+'|'+lid+'|'+obj;
    if(seenSched[dedupKey])return;
    seenSched[dedupKey]=true;
    if(!csvSchedule[ds])csvSchedule[ds]=[];
    csvSchedule[ds].push({pid:lid,obj});
  });
  const newProps=[];
  pipelineRows.forEach(p=>{
    const lid=(p['Main Listing']||'').trim();if(!lid)return;
    const stage=(p['Transaction Stage']||'').trim();
    const isOwned=stage.includes('TAH - Owned');
    let profit=Math.round(parseFloat((p['Potential Profit']||'0').replace(/,/g,''))||0);
    let exp=Math.round(parseFloat((p['# of Days to Expiration']||'0'))||0);
    if(isOwned)exp=0;
    let priceDrops=Math.round(parseFloat((p['# of Price Drops']||'0'))||0);
    const sendNeighbor=(p['Send Neighbor Letters?']||'').trim();
    const neighborOk=true;// Neighbor campaigns available for all properties
    const hist=histByLid[lid]||[];
    let lastCamp=null;
    hist.forEach(h=>{try{const pp=h.runDate.split('/');const d=new Date(parseInt(pp[2]),parseInt(pp[0])-1,parseInt(pp[1]));if(!lastCamp||d>lastCamp)lastCamp=d;}catch(e){}});
    const lastCampStr=lastCamp?lastCamp.getFullYear()+'-'+String(lastCamp.getMonth()+1).padStart(2,'0')+'-'+String(lastCamp.getDate()).padStart(2,'0'):null;
    newProps.push({
      id:lid,address:(p['Property Address']||'').trim().replace(/"/g,''),
      state:(p['State']||'').trim(),county:(p['County']||'').trim(),
      profit,dom:Math.round(parseFloat((p['Website DOM']||'0'))||0),expDays:exp,
      pod:(p['POD']||'').trim(),acreage:(p['Total Property Size']||'').trim(),
      neighborOk,lastCampaign:lastCampStr,
      price:(p['Current Cash Price']||'').trim(),mls:(p['MLS']||'').trim(),
      listedMLS:(p['Listed on MLS']||'').trim(),listedFB:(p['Listed on FB?']||'').trim(),
      listingStatus:(p['Listing Status']||'').trim(),propertyType:(p['Property Type']||'').trim(),
      zillowSaves:(p['Zillow Saves']||'').trim(),ddStatus:(p['Property DD Status']||'').trim(),
      totalLeads:(p['Total Sourced Leads']||'').trim(),totalQualified:(p['Total Qualified Leads']||'').trim(),
      salesHub:(p['The Sales Hub']||'').trim(),priceDrops:String(priceDrops),
      history:hist,isOwned,transactionStage:stage
    });
  });
  return{props:newProps,csvSchedule};
}

function mergeSchedule(csvSchedule){
  const now=new Date();
  const todayDs=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const merged={};
  for(const[ds,items]of Object.entries(csvSchedule)){
    merged[ds]=items.map(i=>({...i}));
  }
  for(const[ds,items]of Object.entries(state.schedule)){
    if(ds<todayDs)continue;
    items.forEach(it=>{
      if(!it.manual)return;
      if(!merged[ds])merged[ds]=[];
      const existsInCSV=csvSchedule[ds]&&csvSchedule[ds].some(c=>c.pid===it.pid&&c.obj===it.obj);
      if(!existsInCSV){
        merged[ds].push({...it,manual:true});
      }
    });
  }
  const twoWeeksAgo=new Date(now);twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14);
  const twoWeeksDs=dateStr(twoWeeksAgo);
  for(const[ds,items]of Object.entries(state.schedule)){
    if(ds>=todayDs||ds<twoWeeksDs)continue;
    items.forEach(it=>{
      if(!it.manual)return;
      if(!merged[ds])merged[ds]=[];
      const alreadyThere=merged[ds].some(c=>c.pid===it.pid&&c.obj===it.obj);
      if(!alreadyThere)merged[ds].push({...it,manual:true});
    });
  }
  return merged;
}

async function handleRefreshUpload(files){
  if(files.length<2){alert('Please select both CSV files (hold Ctrl/Cmd to select multiple).');return;}
  // Reload latest Firestore state first to get everyone's changes (Gab, Jose)
  await loadFromFirestore();
  let pText='',hText='';
  for(const f of files){
    const text=await f.text();const lower=f.name.toLowerCase();
    if(lower.includes('pipeline')||lower.includes('properties')||lower.includes('performance'))pText=text;
    else hText=text;
  }
  if(!pText||!hText){alert('Could not identify files. Make sure filenames contain "performance/pipeline/properties" and "history".');return;}
  const oldIds=state.lastUploadPropIds;// null on first ever upload
  const pipeline=Papa.parse(pText,{header:true,skipEmptyLines:true}).data;
  const history=Papa.parse(hText,{header:true,skipEmptyLines:true}).data;
  const result=processCSVData(pipeline,history);
  const savedInstructions={...state.campInstructions};
  PROPS=result.props;
  state.schedule=mergeSchedule(result.csvSchedule);
  MISSED=[];
  state.campInstructions=savedInstructions;
  // Track current prop IDs for next upload comparison
  state.lastUploadPropIds=new Set(PROPS.map(p=>p.id));
  const todayStr=new Date().toISOString().split('T')[0];
  // Only detect new properties if we have a previous upload baseline
  if(oldIds){
    const newIds=PROPS.filter(p=>!oldIds.has(p.id)).map(p=>({id:p.id,detected:todayStr}));
    if(newIds.length>0){
      state.newPropertyIds=[...state.newPropertyIds,...newIds];
      alert('\u{1F195} '+newIds.length+' new propert'+(newIds.length===1?'y':'ies')+' detected! Check the New tab.');
    }
  }else{
    // First upload — establish baseline, clear any stale new property flags
    state.newPropertyIds=[];
  }
  await saveToFirestore();
  renderSidebar();renderResched();renderCal();updateStats();
  document.getElementById('refresh-csv').value='';
}

// Count business days between two date strings (absolute distance)
function bizDaysBetween(ds1,ds2){
  const [y1,m1,dy1]=ds1.split('-').map(Number);const [y2,m2,dy2]=ds2.split('-').map(Number);
  let d1=new Date(y1,m1-1,dy1),d2=new Date(y2,m2-1,dy2);
  if(d1>d2){const tmp=d1;d1=d2;d2=tmp;}
  let count=0;const cur=new Date(d1);
  cur.setDate(cur.getDate()+1);
  while(cur<=d2){
    const dow=cur.getDay();
    if(dow>=1&&dow<=6)count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}

// Check if same property+outreach exists within 5 biz days of targetDate
function findConflict(pid,obj,targetDate,excludeDate){
  for(const[ds,items]of Object.entries(state.schedule)){
    if(ds===targetDate)continue; // don't conflict with self on same day
    if(excludeDate&&ds===excludeDate)continue; // exclude the day we're moving FROM
    for(const item of items){
      if(item.pid===pid&&item.obj===obj){
        const gap=bizDaysBetween(ds,targetDate);
        if(gap<=5)return ds;
      }
    }
  }
  return null;
}

function remSched(ds,idx,e){

    MISSED.push({pid:removed.pid,obj:removed.obj,date:removed.missedDate});
    renderResched();
  }
  renderCal();updateStats();saveToFirestore();
}

function buildSchedRows(pid){
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const rows=[];
  const prop=PROPS.find(p=>p.id===pid);
  const COUNTY_TYPES=new Set(['Realtors Reach Out','Buyer Base Reach Out','InvestorBase Reach Out']);
  
  // Build county history for this property (all county-eligible types)
  const countyHist={};
  if(prop&&prop.history){
    prop.history.forEach(h=>{
      if(!h.counties||!COUNTY_TYPES.has(h.objective))return;
      extractCountyNames(h.counties).forEach(n=>{
        if(!countyHist[n])countyHist[n]=[];
        countyHist[n].push(h.runDate);
      });
    });
  }
  
  const todayDs=dateStr(TODAY);
  
  for(const[ds,items]of Object.entries(state.schedule)){
    items.forEach((it,idx)=>{
      if(it.pid===pid){
        const [yr,mo,dy]=ds.split('-').map(Number);
        const d=new Date(yr,mo-1,dy);
        const dateLabel=mn[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
        const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
        const s=SHORT[it.obj]||it.obj;
        const cls=CLS[it.obj]||'realtor';
        const key=ds+'|'+pid+'|'+it.obj;
        const ci=state.campInstructions[key]||{};
        const hasCounties=COUNTY_TYPES.has(it.obj);
        const isManual=!!it.manual;
        const daysDiff=Math.round((TODAY-d)/86400000);
        const isLocked=daysDiff>14;
        const isPast=ds<todayDs;
        rows.push({ds,dateLabel,dow,s,cls,key,ci,sortDate:d,hasCounties,pid,obj:it.obj,isManual,isLocked,isPast});
      }
    });
  }
  rows.sort((a,b)=>a.sortDate-b.sortDate);
  if(rows.length===0)return'<div class="no-sched">No campaigns scheduled yet. Drag campaigns from the sidebar to the calendar.</div>';
  return rows.map(r=>{
    // Build county warnings for this row (all county-eligible types)
    let countyWarningHtml='';
    if(r.hasCounties&&r.ci.counties){
      const inputNames=extractCountyNames(r.ci.counties);
      const otherSchedCounties={};
      for(const[k2,ci2]of Object.entries(state.campInstructions)){
        if(k2===r.key||!ci2.counties)continue;
        const p2=k2.split('|');
        if(p2[1]!==pid||!COUNTY_TYPES.has(p2[2]))continue;
        extractCountyNames(ci2.counties).forEach(n=>{
          if(!otherSchedCounties[n])otherSchedCounties[n]=[];
          otherSchedCounties[n].push('Scheduled: '+p2[0]);
        });
      }
      const warnings=[];
      const seen=new Set();
      inputNames.forEach(name=>{
        for(const[histName,dates]of Object.entries(countyHist)){
          if(histName===name||histName.includes(name)||name.includes(histName)){
            const k=name+'|hist|'+dates.join(',');
            if(!seen.has(k)){seen.add(k);dates.forEach(dt=>{warnings.push({county:name,date:dt});});}
          }
        }
        for(const[histName,dates]of Object.entries(otherSchedCounties)){
          if(histName===name||histName.includes(name)||name.includes(histName)){
            const k=name+'|sched|'+dates.join(',');
            if(!seen.has(k)){seen.add(k);dates.forEach(dt=>{warnings.push({county:name,date:dt});});}
          }
        }
      });
      if(warnings.length>0){
        countyWarningHtml='<div class="county-warning">⚠️ ';
        const wSeen=new Set();
        warnings.forEach(w=>{
          const wk=w.county+'|'+w.date;
          if(wSeen.has(wk))return;wSeen.add(wk);
          countyWarningHtml+=`<strong>${w.county}</strong> was already targeted on <strong>${w.date}</strong><br>`;
        });
        countyWarningHtml+='<span class="mkt-note">This is for Marketing Team</span></div>';
      }
    }
    
    const dis=r.isLocked?' disabled':'';
    
    // Sequence dropdown (county-eligible types only)
    const seqLabels={'Realtors Reach Out':'Realtors','Buyer Base Reach Out':'buyers','InvestorBase Reach Out':'investors'};
    const seqField=r.hasCounties?`
    <div class="seq-note">⚠ For Campaign Sequence - Only fill out if you are targeting the same ${seqLabels[r.obj]||r.s} in the previously targeted County/City</div>
    <div class="sched-row-field">
      <span class="sched-row-label">Campaign Sequence</span>
      <select onchange="saveCampField('${r.key}','sequence',this.value)"${dis}>
        <option value=""${!r.ci.sequence?' selected':''}>— N/A —</option>
        ${[2,3,4,5,6,7,8,9,10].map(n=>`<option value="${n}"${r.ci.sequence==n?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>`:'';
    
    // Counties field (county-eligible types only)
    const placeholders={'Realtors Reach Out':'Enter counties or cities to target for this Realtor campaign...','Buyer Base Reach Out':'Enter counties or cities to target for this Buyer Base campaign...','InvestorBase Reach Out':'Enter target cities for this Investor Base campaign...'};
    const countiesField=r.hasCounties?`
    <div class="sched-row-field" style="align-items:flex-start">
      <span class="sched-row-label" style="margin-top:6px">Target Counties/Cities</span>
      <div style="flex:1">
        <textarea class="counties-input" id="counties-${r.key.replace(/[| ]/g,'_')}" placeholder="${placeholders[r.obj]||'Enter target counties or cities...'}"${r.isLocked?' readonly':''} ${r.isLocked?'':'oninput="saveCampField(\''+r.key+'\',\'counties\',this.value)" onblur="refreshCountyWarnings(\''+r.key+'\')\"'}>${r.ci.counties||''}</textarea>
        ${countyWarningHtml}
      </div>
    </div>`:'';
    
    const rowClass=(r.isLocked?'sched-row sched-locked':'sched-row')+(r.isPast?' collapsed':'');
    const lockedBadge=r.isLocked?'<span class="locked-badge">🔒 Locked</span>':'';
    const expandArrow=r.isPast?'<span class="expand-arrow">▶</span>':'';
    
    return`<div class="${rowClass}" data-key="${r.key}">
    <div class="sched-row-header"${r.isPast?' onclick="this.parentElement.classList.toggle(\'collapsed\')" style="cursor:pointer"':''}>
      ${expandArrow}
      <span class="sched-row-date">${r.dow}, ${r.dateLabel}</span>
      <span class="campaign-chip ${r.cls}" style="pointer-events:none;cursor:default">${r.s}</span>
      ${lockedBadge}
    </div>
    <div class="sched-row-body">
    <div class="sched-row-field">
      <span class="sched-row-label">Outreach Tool</span>
      <select onchange="saveCampField('${r.key}','tool',this.value)"${dis}>
        <option value=""${!r.ci.tool?' selected':''}>— Select —</option>
        <option value="Texting"${r.ci.tool==='Texting'?' selected':''}>Texting</option>
        <option value="Cold Calling"${r.ci.tool==='Cold Calling'?' selected':''}>Cold Calling</option>
      </select>
    </div>${seqField}${countiesField}
    <div class="sched-row-field" style="align-items:flex-start">
      <span class="sched-row-label" style="margin-top:6px">Instructions</span>
      <textarea placeholder="Target radius, list size, special notes..."${r.isLocked?' readonly':''} ${r.isLocked?'':'oninput="saveCampField(\''+r.key+'\',\'instructions\',this.value)"'}>${r.ci.instructions||''}</textarea>
    </div>
    </div>
  </div>`;}).join('');
}

// Extract clean county/city names from a text string
function extractCountyNames(text){
  if(!text)return[];
  const names=[];
  const stopWords=new Set(['county','counties','city','and','the','all','zip','codes','in','this','area','has','been','scraped','targeted','not','included','on','list','of','for','from','to','with','new','sent','text','leads','fresh','land','insight','insights','not available','had','limit','credits','apify','these','are']);
  const stateAbbrs=new Set(['al','ak','az','ar','ca','co','ct','de','fl','ga','hi','id','il','in','ia','ks','ky','la','me','md','ma','mi','mn','ms','mo','mt','ne','nv','nh','nj','nm','ny','nc','nd','oh','ok','or','pa','ri','sc','sd','tn','tx','ut','vt','va','wa','wv','wi','wy']);
  
  // Extract 5-digit zip codes first
  const zips=text.match(/\b\d{5}\b/g)||[];
  zips.forEach(z=>names.push(z));
  
  // Split on common delimiters for county/city names
  const chunks=text.split(/[,;\|\n\r]+/);
  chunks.forEach(chunk=>{
    // Clean: remove zip codes and other numbers, special chars
    let clean=chunk.replace(/\d{5}/g,'').replace(/\d+/g,'').replace(/[:\-\?#()\/\\]/g,' ').trim();
    clean=clean.replace(/\s+(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY)\s*$/i,'').trim();
    clean=clean.replace(/\s+county$/i,'').trim();
    if(clean.length<2)return;
    const lower=clean.toLowerCase();
    if(stopWords.has(lower)||stateAbbrs.has(lower))return;
    if(lower.length>=2)names.push(lower);
  });
  return[...new Set(names)];
}

function checkCountyConflicts(pid){
  const prop=PROPS.find(p=>p.id===pid);
  if(!prop)return[];
  const conflicts=[];
  const COUNTY_TYPES=new Set(['Realtors Reach Out','Buyer Base Reach Out','InvestorBase Reach Out']);
  
  // Build county history from all county-eligible types
  const countyHist={};
  if(prop.history){
    prop.history.forEach(h=>{
      if(!h.counties||!COUNTY_TYPES.has(h.objective))return;
      extractCountyNames(h.counties).forEach(n=>{
        if(!countyHist[n])countyHist[n]=[];
        countyHist[n].push(h.runDate);
      });
    });
  }
  
  // Check each scheduled county-eligible campaign
  for(const[key,ci]of Object.entries(state.campInstructions)){
    const parts=key.split('|');
    if(parts[1]!==pid||!COUNTY_TYPES.has(parts[2])||!ci.counties)continue;
    const inputNames=extractCountyNames(ci.counties);
    
    const otherSched={};
    for(const[k2,ci2]of Object.entries(state.campInstructions)){
      if(k2===key||!ci2.counties)continue;
      const p2=k2.split('|');
      if(p2[1]!==pid||!COUNTY_TYPES.has(p2[2]))continue;
      extractCountyNames(ci2.counties).forEach(n=>{
        if(!otherSched[n])otherSched[n]=[];
        otherSched[n].push('Scheduled: '+p2[0]);
      });
    }
    
    inputNames.forEach(name=>{
      for(const[histName,dates]of Object.entries(countyHist)){
        if(histName===name||histName.includes(name)||name.includes(histName)){
          dates.forEach(dt=>{conflicts.push({county:name,date:dt});});
        }
      }
      for(const[histName,dates]of Object.entries(otherSched)){
        if(histName===name||histName.includes(name)||name.includes(histName)){
          dates.forEach(dt=>{conflicts.push({county:name,date:dt});});
        }
      }
    });
  }
  
  const seen=new Set();
  return conflicts.filter(c=>{const k=c.county+'|'+c.date;if(seen.has(k))return false;seen.add(k);return true;});
}

function handleModalSave(){
  const titleEl=document.querySelector('.modal-subtitle');
  if(!titleEl)return;
  const pidMatch=titleEl.textContent.match(/L\s*-\s*\d+/);
  if(!pidMatch)return;
  const pid=pidMatch[0];
  const msg=document.getElementById('modal-save-msg');
  
  // Check for county conflicts
  const conflicts=checkCountyConflicts(pid);
  if(conflicts.length>0){
    let popupMsg='<div style="text-align:left;font-size:13px;line-height:1.6">⚠️ <strong>County/City conflicts detected:</strong><br><br>';
    conflicts.forEach(c=>{
      popupMsg+=`• <strong>${c.county}</strong> was already targeted on <strong>${c.date}</strong><br>`;
    });
    popupMsg+='<br>Do you want to proceed anyway?</div>';
    
    showConfirm(popupMsg,
      ()=>{
        // Proceed - save anyway
        saveToFirestore();
        msg.textContent='✓ Saved successfully';
        msg.style.color='#059669';
        msg.style.opacity='1';
        setTimeout(()=>{msg.style.opacity='0';},2000);
      },
      ()=>{
        // Cancel
        msg.textContent='Save cancelled';
        msg.style.color='#DC2626';
        msg.style.opacity='1';
        setTimeout(()=>{msg.style.opacity='0';msg.style.color='#059669';},2000);
      },
      'Proceed'
    );
  }else{
    saveToFirestore();
    msg.textContent='✓ Saved successfully';
    msg.style.color='#059669';
    msg.style.opacity='1';
    setTimeout(()=>{msg.style.opacity='0';},2000);
  }
}

// MASTER CAMPAIGN REPORT
let mcrRange='thisweek';

function getDateRange(range){
  const now=new Date(TODAY);
  const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
  const dow=now.getDay();// 0=Sun
  let start,end;
  if(range==='yesterday'){
    const yd=new Date(y,m,d-1);
    start=end=yd;
  }else if(range==='thisweek'){
    // Monday to today
    const diff=dow===0?6:dow-1;
    start=new Date(y,m,d-diff);
    end=now;
  }else if(range==='lastweek'){
    const diff=dow===0?6:dow-1;
    const thisMonday=new Date(y,m,d-diff);
    start=new Date(thisMonday);start.setDate(start.getDate()-7);
    end=new Date(thisMonday);end.setDate(end.getDate()-1);
  }else if(range==='thismonth'){
    start=new Date(y,m,1);
    end=now;
  }else if(range==='lastmonth'){
    start=new Date(y,m-1,1);
    end=new Date(y,m,0);// last day of prev month
  }
  return{
    start:dateStr(start),
    end:dateStr(end)
  };
}

function parseCampaignDate(rd){
  if(!rd)return null;
  const p=rd.split('/');
  if(p.length<3)return null;
  const dt=new Date(parseInt(p[2]),parseInt(p[0])-1,parseInt(p[1]));
  return dateStr(dt);
}

function buildMCRData(range){
  const{start,end}=getDateRange(range);
  const propData={};// pid -> {realtor,buyer,neighbor,investor,pricedrop,total,counties}
  
  PROPS.forEach(prop=>{
    if(!prop.history)return;
    let realtor=0,buyer=0,neighbor=0,investor=0,pricedrop=0;
    const counties=[];
    
    prop.history.forEach(h=>{
      const ds=parseCampaignDate(h.runDate);
      if(!ds||ds<start||ds>end)return;
      
      if(h.objective==='Realtors Reach Out'){
        realtor++;
        if(h.counties){
          counties.push({date:h.runDate,text:h.counties});
        }
      }
      else if(h.objective==='Buyer Base Reach Out')buyer++;
      else if(h.objective==='Neighbor Reach Out')neighbor++;
      else if(h.objective==='InvestorBase Reach Out')investor++;
      else if(h.objective==='Price Reduction')pricedrop++;
    });
    
    const total=realtor+buyer+neighbor+investor+pricedrop;
    if(total>0){
      propData[prop.id]={realtor,buyer,neighbor,investor,pricedrop,total,counties,prop};
    }
  });
  
  return propData;
}

function renderMCR(){
  const data=buildMCRData(mcrRange);
  const body=document.getElementById('mcr-body');
  const summary=document.getElementById('mcr-summary');
  const entries=Object.values(data).sort((a,b)=>b.total-a.total);
  
  if(entries.length===0){
    body.innerHTML='<div class="mcr-empty">No completed campaigns found for this period.</div>';
    summary.innerHTML='';
    return;
  }
  
  let html='<table class="mcr-table"><thead><tr>';
  html+='<th>Property</th><th style="text-align:center">Realtor</th><th style="text-align:center">Buyer Base</th><th style="text-align:center">Neighbor</th><th style="text-align:center">Investor</th><th style="text-align:center">Price Drop</th><th style="text-align:center">Total</th><th>Realtor Counties/Cities Targeted</th><th style="text-align:center">Expiration</th>';
  html+='</tr></thead><tbody>';
  
  let grandTotal=0,grandRealtor=0,grandBuyer=0,grandNeighbor=0,grandInvestor=0,grandPricedrop=0;
  
  entries.forEach(e=>{
    const p=e.prop;
    const addr=shortAddr(p.address);
    grandTotal+=e.total;grandRealtor+=e.realtor;grandBuyer+=e.buyer;grandNeighbor+=e.neighbor;grandInvestor+=e.investor;grandPricedrop+=e.pricedrop;
    
    // Format counties
    let countiesHtml='—';
    if(e.counties.length>0){
      countiesHtml=e.counties.map(c=>{
        const names=extractCountyNames(c.text);
        if(names.length===0)return'';
        return'<div style="margin-bottom:3px"><span style="font-size:8px;color:var(--text3)">('+c.date+')</span> '+names.map(n=>'<span class="mcr-county-tag">'+n+'</span>').join(' ')+'</div>';
      }).filter(x=>x).join('');
      if(!countiesHtml)countiesHtml='—';
    }
    
    // Expiration
    let expHtml='',expClass='ok';
    if(p.expDays===0){expHtml='TAH Owned';expClass='owned';}
    else if(p.expDays<0){expHtml='Expired';expClass='expired';}
    else if(p.expDays<=15){expHtml=p.expDays+'d';expClass='urgent';}
    else{expHtml=p.expDays+'d';expClass='ok';}
    
    const cc=(n)=>n>0?'has':'zero';
    
    html+=`<tr>
      <td><div class="mcr-prop-addr">${addr}</div><div class="mcr-prop-sub">${p.id} · ${p.state} · ${p.pod}</div></td>
      <td class="mcr-count ${cc(e.realtor)}">${e.realtor}</td>
      <td class="mcr-count ${cc(e.buyer)}">${e.buyer}</td>
      <td class="mcr-count ${cc(e.neighbor)}">${e.neighbor}</td>
      <td class="mcr-count ${cc(e.investor)}">${e.investor}</td>
      <td class="mcr-count ${cc(e.pricedrop)}">${e.pricedrop}</td>
      <td class="mcr-total">${e.total}</td>
      <td class="mcr-counties">${countiesHtml}</td>
      <td class="mcr-exp ${expClass}">${expHtml}</td>
    </tr>`;
  });
  
  html+='</tbody></table>';
  body.innerHTML=html;
  
  summary.innerHTML=`
    <span>Properties: <strong>${entries.length}</strong></span>
    <span>Total Campaigns: <strong>${grandTotal}</strong></span>
    <span>Realtor: <strong>${grandRealtor}</strong></span>
    <span>Buyer Base: <strong>${grandBuyer}</strong></span>
    <span>Neighbor: <strong>${grandNeighbor}</strong></span>
    <span>Investor: <strong>${grandInvestor}</strong></span>
    <span>Price Drop: <strong>${grandPricedrop}</strong></span>
  `;
}

function openMCR(){
  document.getElementById('mcr-overlay').classList.add('show');
  renderMCR();
}

function setMCRFilter(range){
  mcrRange=range;
  document.querySelectorAll('.mcr-filter').forEach(b=>b.classList.toggle('active',b.dataset.range===range));
  renderMCR();
}

document.getElementById('mcr-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});

// POD FILTER
function togglePodFilter(pod){
  if(state.podFilter===pod)state.podFilter=null; // toggle off
  else state.podFilter=pod;
  document.querySelectorAll('.pod-filter').forEach(el=>{
    el.classList.toggle('active',el.dataset.pod===state.podFilter);
  });
  renderSidebar();
}

function getFilteredProps(){
  if(!state.podFilter)return PROPS;
  return PROPS.filter(p=>(p.pod||'').trim()===state.podFilter);
}

function initApp(){
  for(const[ds,items]of Object.entries(LAST_WEEK_SCHEDULE)){
    if(!state.schedule[ds])state.schedule[ds]=items.map(i=>({...i}));
  }
  state.currentMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  renderSidebar();renderResched();renderCal();updateStats();
  document.getElementById('prev-month').onclick=()=>{state.currentMonth.setMonth(state.currentMonth.getMonth()-1);renderCal()};
  document.getElementById('next-month').onclick=()=>{state.currentMonth.setMonth(state.currentMonth.getMonth()+1);renderCal()};
  document.getElementById('modal').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')};
}
async function boot(){
  const hasData=await loadFromFirestore();
  initApp();
}
document.addEventListener('DOMContentLoaded',boot);
